# ============================================================================
# Project Montage - Model Configuration
# ============================================================================
#
# This configuration file specifies the GenAI models used by the Project Montage
# MCP server for media generation tasks including text, image, and video
# creation. Each model can be customized to use different versions or variants
# supported by Google's Vertex AI and Generative AI APIs.
#
# ============================================================================
# Supported Models by Category
# ============================================================================
#
# TEXT GENERATION (Gemini):
#   - gemini-3.1-flash-lite (Default - balanced performance)
#   - gemini-2.5-pro
#   - gemini-2.5-flash
#   - gemini-2.5-flash-lite
#
# IMAGE GENERATION & EDITING (Gemini):
#   - gemini-2.5-flash-image
#   - gemini-3.1-flash-image-preview (Recommended for Project Montage)
#
# VIDEO GENERATION (Veo):
#   - veo-3.1-generate-001 (Recommended - higher quality)
#   - veo-3.1-fast-generate-001 (Faster processing)
#   - veo-3.1-generate-preview
#   - veo-3.1-fast-generate-preview
#
# ============================================================================

# Text generation model used for storyboard creation and prompt building
gemini_model: gemini-3.1-flash-lite

# Image generation and editing model
gemini_image_model: gemini-2.5-flash-image

# Video generation model
veo_model: veo-3.1-generate-001
